<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />

    <title>Mockingboard</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('mockingboard:theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {
          /* localStorage unavailable (private browsing, etc) - ignore */
        }
      }
    </script>
    <meta
      name="description"
      content="A free, open source tool for arranging mockups into a single exportable PNG. Drop, arrange, export — no accounts, no upload, no settings."
    />
    <meta name="theme-color" content="#FAF6F1" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0E0E0E" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mockingboard" />
    <meta
      property="og:description"
      content="Drop mockups. Arrange freely. Export one beautiful PNG."
    />
    <meta property="og:url" content="https://mockingboard.design/" />
    <meta property="og:image" content="https://mockingboard.design/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mockingboard" />
    <meta name="twitter:image" content="https://mockingboard.design/og-image.png" />
    <meta
      name="twitter:description"
      content="Drop mockups. Arrange freely. Export one beautiful PNG."
    />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
